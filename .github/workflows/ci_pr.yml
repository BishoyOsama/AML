name: CI - PR gate to main

on:
    pull_request:
        branches:
            - main
        paths:
            - "airflow/dags/**"
            - "airflow/dags/dbt/dbt_aml/**"
            - "airflow/requirements.txt"

jobs:
    dbt-slim-ci:
        name: dbt slim CI - compile & run & test changed models
        runs-on: ubuntu-latest
        environment: dev
        env:
            SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
            SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
            SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
            SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
            SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
            SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}

        steps:
            - name: Checkout PR branch
              uses: actions/checkout@v4
            
            - name: Set up Python 3.11
              uses: actions/setup-python@v5
              with:
                python-version: "3.11"
            
            - name: Cache dependencies
              id: dbt_cache
              uses: actions/cache@v4
              with:
                path: ./airflow/dags/dbt/dbt_aml/dbt_packages
                key: ${{ runner.os }}-pip-dbt-${{ hashFiles('./airflow/dags/dbt/dbt_aml/package-lock.yml') }}
            
            - name: Install dbt & dbt-snowflake
              run: pip install dbt-core==1.11.11 dbt-snowflake==1.11.5
            

            - name: Write dev profiles.yml
              run: |
                cat > ./airflow/dags/dbt/dbt_aml/profiles.yml << EOF
                dbt_aml:
                    outputs:
                        dev:
                         account: "${{ env.SNOWFLAKE_ACCOUNT }}"
                         database: "${{ env.SNOWFLAKE_DATABASE }}"
                         password: "${{ env.SNOWFLAKE_PASSWORD }}"
                         role: "${{ env.SNOWFLAKE_ROLE }}"
                         schema: default
                         threads: 1
                         type: snowflake
                         user: "${{ env.SNOWFLAKE_USER }}"
                         warehouse: "${{ env.SNOWFLAKE_WAREHOUSE }}"
                    target: dev
                EOF
            
            - name: dbt deps
              if: steps.dbt_cache.outputs.cache-hit != 'true'
              run: dbt deps --project-dir ./airflow/dags/dbt/dbt_aml --profiles-dir ./airflow/dags/dbt/dbt_aml
            
            - name: dbt compile
              run: dbt compile --project-dir ./airflow/dags/dbt/dbt_aml --profiles-dir ./airflow/dags/dbt/dbt_aml
            
            
            - name: Download prod manifest from cd workflow
              uses: dawidd6/action-download-artifact@v21
              with:
                workflow: cd.yml
                branch: main
                name: prod-manifest
                path: ./airflow/dags/dbt/dbt_aml/production_state
              continue-on-error: true

            
            - name: dbt run modified models only
              run: |
                if [ -f ./airflow/dags/dbt/dbt_aml/production_state/manifest.json ]; then
                    echo "Prod manifest found - running slim CI on changed models  + downstream models only"
                    dbt run \
                     --project-dir ./airflow/dags/dbt/dbt_aml/ \
                     --profiles-dir ./airflow/dags/dbt/dbt_aml/ \
                     --select state:modified+ \
                     --defer \ 
                     --state ./airflow/dags/dbt/dbt_aml/production_state \
                     --target dev
                else
                    echo "No production manifest found - skipping slim CI on first PR - running full dbt run"
                    dbt run \
                        --project-dir ./airflow/dags/dbt/dbt_aml/ \
                        --profiles-dir ./airflow/dags/dbt/dbt_aml/ \
                        --target dev
                fi
            
            - name: dbt test modified models only
              run: |
                if [ -f ./airflow/dags/dbt/dbt_aml/production_state/manifest.json ]; then
                    echo "Prod manifest found - running CI tests on changed models + downstream models only"
                    dbt test \
                     --project-dir ./airflow/dags/dbt/dbt_aml/ \
                     --profiles-dir ./airflow/dags/dbt/dbt_aml/ \
                     --select state:modified+ \
                     --defer \ 
                     --state ./airflow/dags/dbt/dbt_aml/production_state \
                     --target dev
                else
                    echo "No production manifest found - skipping slim CI tests on first PR"
                    echo "Running full test suite"
                    dbt test \
                        --project-dir ./airflow/dags/dbt/dbt_aml/ \
                        --profiles-dir ./airflow/dags/dbt/dbt_aml/ \
                        --target dev
                fi
            
            # upload manifest file generated for debugging purposes
            - name: upload CI manifest artifact
              if: always()
              uses: actions/upload-artifact@v4
              with:
                name: manifest-pr-${{ github.event.pull_request.number }}
                path: ./airflow/dags/dbt/dbt_aml/target/manifest.json
                retention-days: 7

    
    airflow-gate:
        name: Airflow DAG import check
        runs-on: ubuntu-latest
        environment: dev
        env:
            SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
            SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
            SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
            SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
            SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
            SNOWFLAKE_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}

        steps:
            - name: Checkout branch (get branch code)
              uses: actions/checkout@v4

            - name: Set up Python 3.11
              uses: actions/setup-python@v5
              with:
                python-version: "3.11"
            

            - name: Cache dependencies
              id: dbt_cache
              uses: actions/cache@v4
              with:
                path: ./airflow/dags/dbt/dbt_aml/dbt_packages
                key: ${{ runner.os }}-pip-dbt-${{ hashFiles('./airflow/dags/dbt/dbt_aml/package-lock.yml') }}

            - name: Install dbt & dbt-snowflake
              run: pip install dbt-core==1.11.11 dbt-snowflake==1.11.5
            
            - name: Install Airflow & Cosmos 
              run: |
                pip install \
                  apache-airflow \
                  astronomer-cosmos \
                  apache-airflow-providers-snowflake
            
            
            - name: Write dev profiles.yml
              run: |
                cat > ./airflow/dags/dbt/dbt_aml/profiles.yml << EOF
                dbt_aml:
                    outputs:
                        dev:
                         account: "${{ env.SNOWFLAKE_ACCOUNT }}"
                         database: "${{ env.SNOWFLAKE_DATABASE }}"
                         password: "${{ env.SNOWFLAKE_PASSWORD }}"
                         role: "${{ env.SNOWFLAKE_ROLE }}"
                         schema: default
                         threads: 1
                         type: snowflake
                         user: "${{ env.SNOWFLAKE_USER }}"
                         warehouse: "${{ env.SNOWFLAKE_WAREHOUSE }}"
                    target: dev
                EOF
            - name: dbt deps
              if: steps.dbt_cache.outputs.cache-hit != 'true'
              run: dbt deps --project-dir ./airflow/dags/dbt/dbt_aml --profiles-dir ./airflow/dags/dbt/dbt_aml

            - name: dbt compile
              run: dbt compile --project-dir ./airflow/dags/dbt/dbt_aml --profiles-dir ./airflow/dags/dbt/dbt_aml

            # install astro cli
            - name: Install Astro CLI
              uses: astronomer/setup-astro-cli@v0.0.1
            
              # parse dbt dags (using compiled manifest file)
            - name: Parse DBT DAGs
              run: |
                cd ./airflow/ 
                astro dev parse